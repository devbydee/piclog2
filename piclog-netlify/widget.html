<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

img {
  display: block;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  border: 0;
}
</style>
</head>

<body>
<img id="piclog-img" src="" alt="">

<script>
async function loadPiclog() {
  const img = document.getElementById("piclog-img");

  try {
    const response = await fetch("/.netlify/functions/get-piclog?v=" + Date.now());
    const data = await response.json();

    if (data.src) {
      img.src = data.src;
      img.alt = "";
    }
  } catch (error) {
    console.warn("piclog failed to load", error);
  }
}

loadPiclog();
</script>
</body>
</html>
